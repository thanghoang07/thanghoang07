<!-- ─────────────────────────────────────
         CERTIFICATIONS
         ───────────────────────────────────── -->
<section id="certifications" class="ds-section">
  <div class="ds-container">
    <div class="ds-section-header ds-section-header--center ds-reveal">
      <span class="ds-eyebrow" id="certifications-subtitle" data-i18n="cert-subtitle">Certifications</span>
      <h2 class="ds-h2" id="certifications-title" data-i18n="cert-title" style="color:rgba(255,255,255,.92);">
        Certifications</h2>
    </div>

    <div
      style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;max-width:700px;margin:0 auto;">
      <div class="glass-card ds-reveal ds-stagger-1" style="padding:1.5rem;display:flex;align-items:center;gap:1rem;">
        <div
          style="width:48px;height:48px;border-radius:var(--r-md);background:linear-gradient(135deg,rgba(124,58,237,.25),rgba(34,211,238,.12));border:var(--b-accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i class="fas fa-certificate" style="color:var(--c-violet-hi);font-size:1.1rem;"></i>
        </div>
        <div>
          <div id="cert-xamarin-title"
            style="font-family:var(--f-display);font-weight:600;font-size:.9rem;color:rgba(255,255,255,.88);">
            Xamarin Cross-Platform Mobile Apps Development</div>
          <div id="cert-xamarin-date" style="font-size:.78rem;color:rgba(255,255,255,.38);margin-top:.2rem;">05/2018
          </div>
        </div>
      </div>

      <div class="glass-card ds-reveal ds-stagger-2" style="padding:1.5rem;display:flex;align-items:center;gap:1rem;">
        <div
          style="width:48px;height:48px;border-radius:var(--r-md);background:linear-gradient(135deg,rgba(124,58,237,.25),rgba(34,211,238,.12));border:var(--b-accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <i class="fas fa-award" style="color:var(--c-violet-hi);font-size:1.1rem;"></i>
        </div>
        <div>
          <div id="cert-flutter-title"
            style="font-family:var(--f-display);font-weight:600;font-size:.9rem;color:rgba(255,255,255,.88);">
            Flutter Development</div>
          <div id="cert-flutter-date" style="font-size:.78rem;color:rgba(255,255,255,.38);margin-top:.2rem;">01/2023
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
