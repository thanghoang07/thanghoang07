  <!-- Critical inline styles: loader + base body override -->
  <style>
    /* ── Loader ── */
    .page-loader {
      position: fixed;
      inset: 0;
      background: var(--c-bg, #080b14);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      z-index: 9999;
      transition: opacity .6s ease, visibility .6s ease
    }

    .page-loader.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none
    }

    .loader-logo {
      font-family: 'Oxanium', monospace;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: _lglow 2s ease-in-out infinite alternate
    }

    @keyframes _lglow {
      0% {
        opacity: .8;
        transform: scale(1)
      }

      100% {
        opacity: 1;
        transform: scale(1.04)
      }
    }

    .loader-spinner {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid rgba(124, 58, 237, .15);
      border-top-color: #7c3aed;
      border-right-color: #22d3ee;
      animation: _lspin .9s linear infinite
    }

    @keyframes _lspin {
      to {
        transform: rotate(360deg)
      }
    }

    .loader-text {
      font-family: 'Oxanium', monospace;
      font-size: .7rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .35);
      animation: _lpulse 1.5s ease-in-out infinite
    }

    @keyframes _lpulse {

      0%,
      100% {
        opacity: .35
      }

      50% {
        opacity: .75
      }
    }

    /* ── Typing cursor ── */
    .typing-cursor {
      display: inline-block;
      width: 3px;
      background: currentColor;
      animation: _blink 1s infinite;
      margin-left: 2px;
      vertical-align: middle
    }

    @keyframes _blink {

      0%,
      50% {
        opacity: 1
      }

      51%,
      100% {
        opacity: 0
      }
    }

    /* ── Hero entrance ── */
    .hero-fade-up {
      opacity: 0;
      transform: translateY(28px);
      animation: _hfu .8s .3s ease-out forwards
    }

    .hero-fade-up-delay {
      opacity: 0;
      transform: translateY(28px);
      animation: _hfu .8s .7s ease-out forwards
    }

    @keyframes _hfu {
      to {
        opacity: 1;
        transform: none
      }
    }

    /* ── Main content hidden until loaded ── */
    body:not(.loaded) .main-content {
      opacity: 0
    }

    .main-content {
      opacity: 1;
      transition: opacity .4s ease
    }

    /* skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255, 255, 255, .04) 25%, rgba(255, 255, 255, .08) 50%, rgba(255, 255, 255, .04) 75%);
      background-size: 200% 100%;
      animation: _sk 1.5s infinite
    }

    @keyframes _sk {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }
  </style>
</head>

  <!-- Tab switching script (inline — no dependency) -->
  <script>
    function switchTab(company) {
      ['hpt', 'tk25', 'nbn', 'devup'].forEach(c => {
        const btn = document.getElementById('tab-' + c);
        const panel = document.getElementById('content-' + c);
        if (btn) btn.classList.toggle('active', c === company);
        if (panel) panel.classList.toggle('hidden', c !== company);
      });
    }
    // Mobile menu
    document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
      document.getElementById('mobile-menu')?.classList.toggle('hidden');
    });
    // Back to top visibility
    window.addEventListener('scroll', () => {
      const btn = document.getElementById('back-to-top');
      if (btn) btn.classList.toggle('show', window.scrollY > 300);
    }, { passive: true });
    document.getElementById('back-to-top')?.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
